name: Package Insight Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/generate-site.sh'
      - '.github/workflows/package-skills.yml'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/generate-site.sh'
      - '.github/workflows/package-skills.yml'
  workflow_dispatch:
  release:
    types: [published]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill structure
        run: |
          errors=0
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            skill_file="$skill_dir/SKILL.md"

            if [ ! -f "$skill_file" ]; then
              echo "ERROR: $skill_name missing SKILL.md"
              errors=$((errors + 1))
              continue
            fi

            if ! head -20 "$skill_file" | grep -q "^name:"; then
              echo "ERROR: $skill_name SKILL.md missing 'name' in frontmatter"
              errors=$((errors + 1))
            fi

            if ! head -20 "$skill_file" | grep -q "^description:"; then
              echo "ERROR: $skill_name SKILL.md missing 'description' in frontmatter"
              errors=$((errors + 1))
            fi

            if [ ! -d "$skill_dir/references" ]; then
              echo "WARN: $skill_name has no references/ directory"
            fi

            echo "OK: $skill_name"
          done

          if [ $errors -gt 0 ]; then
            echo "Validation failed with $errors errors"
            exit 1
          fi

  package:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p dist

      - name: Package each skill
        run: |
          for skill_dir in skills/*/; do
            if [ -f "${skill_dir}SKILL.md" ]; then
              skill_name=$(basename "$skill_dir")
              echo "Packaging: $skill_name"

              temp_dir=$(mktemp -d)
              mkdir -p "$temp_dir/$skill_name"
              cp -r "$skill_dir"* "$temp_dir/$skill_name/"
              (cd "$temp_dir" && zip -r "$skill_name.zip" "$skill_name")
              mv "$temp_dir/$skill_name.zip" "dist/"
              rm -rf "$temp_dir"

              echo "  Created: dist/$skill_name.zip"
            fi
          done

      - name: List packages
        run: ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: insight-skills
          path: dist/*.zip
          retention-days: 90

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate site
        if: github.event_name == 'release' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          export RELEASE_TAG="${{ github.event.release.tag_name || 'latest' }}"
          chmod +x scripts/generate-site.sh
          scripts/generate-site.sh

      - name: Copy downloads to site
        if: github.event_name == 'release' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: cp dist/*.zip site/

      - name: Configure GitHub Pages
        if: github.event_name == 'release' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'release' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    if: github.event_name == 'release' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: package
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
